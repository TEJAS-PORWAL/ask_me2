<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Question ❤️</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height:100vh;
            overflow:hidden;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#ff758c,#ff7eb3);
        }

        .container{
            text-align:center;
        }

        h1{
            color:white;
            font-size:3rem;
            margin-bottom:50px;
        }

        .buttons{
            position:relative;
            width:350px;
            height:150px;
            margin:auto;
        }

        button{
            padding:15px 35px;
            font-size:20px;
            border:none;
            border-radius:30px;
            cursor:pointer;
            transition:0.2s ease;
        }

        #yesBtn{
            background:#4CAF50;
            color:white;
            margin-right:20px;
        }

        #yesBtn:hover{
            transform:scale(1.1);
        }

        #noBtn{
            position:absolute;
            left:200px;
            top:0;
            background:#f44336;
            color:white;
        }

        .success-screen{
            width:100%;
            height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
            color:white;
            padding:20px;
        }

        .success-screen h1{
            margin-bottom:15px;
        }

        .success-screen h2{
            margin-bottom:25px;
        }

        .proposal-video{
            max-width:90vw;
            max-height:70vh;
            width:auto;
            height:auto;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div class="container" id="mainContainer">

    <h1>Will You Be My Girlfriend KRITIKA SRIVASTAV? ❤️</h1>

    <div class="buttons">
        <button id="yesBtn">Yes ❤️</button>
        <button id="noBtn">No 💔</button>
    </div>

</div>

<script>

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");

// Move NO button but keep it visible
document.addEventListener("mousemove", (e) => {

    const rect = noBtn.getBoundingClientRect();

    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;

    const distance = Math.sqrt(
        Math.pow(e.clientX - centerX, 2) +
        Math.pow(e.clientY - centerY, 2)
    );

    // If mouse comes within 100px
    if (distance < 100) {

        const padding = 20;

        const maxX =
            window.innerWidth - noBtn.offsetWidth - padding;

        const maxY =
            window.innerHeight - noBtn.offsetHeight - padding;

        const randomX =
            Math.random() * (maxX - padding) + padding;

        const randomY =
            Math.random() * (maxY - padding) + padding;

        noBtn.style.position = "fixed";
        noBtn.style.left = randomX + "px";
        noBtn.style.top = randomY + "px";
    }
});

yesBtn.addEventListener("click", () => {

    document.body.innerHTML = `
        <div class="success-screen">

            <h1>Yayyy! ❤️🥰</h1>

            <h2>
                I LOVE YOU THE MOST SWEETU 😘💕😁
            </h2>

            <video class="proposal-video"
                   controls
                   autoplay>

                <!-- Replace with your video path -->
                <source src="https://github.com/TEJAS-PORWAL/ask_me/raw/refs/heads/main/assets/v1.mp4"
                        type="video/mp4">

                Your browser does not support videos.

            </video>

        </div>
    `;
});

</script>

</body>
</html>
